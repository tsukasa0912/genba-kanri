<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>現場管理システム</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* メインカラー：彩度を抑えた落ち着いたインディゴ系（モニター表示でも目に優しい） */
    --blue:    #5b7fb5; --blue-d: #4a6a9c; --blue-lt: #eaf0f7;
    --green:   #6fa888; --green-d: #588a6e;
    --red:     #c4766b;
    --gray:    #8a93a3; --gray-lt: #f0f1f3;
    --border:  #e4e6ea; --text: #3d4350; --text-2: #808796;
    --shadow:  0 1px 3px rgba(30,41,59,0.06);
    --shadow-md: 0 4px 16px rgba(30,41,59,0.08);
    --radius:  10px; --cell-h: 130px;
  }
  body { font-family: 'Hiragino Kaku Gothic ProN','Hiragino Sans','Helvetica Neue',Arial,sans-serif; background: #f4f3f1; color: var(--text); }

  /* TOPBAR */
  .topbar { background:#fff; border-bottom:1px solid var(--border); box-shadow:var(--shadow); position:sticky; top:0; z-index:50; }
  .topbar-main { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:58px; }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon { font-size:22px; }
  .logo-text { font-size:17px; font-weight:700; color:var(--text); letter-spacing:-.3px; }
  .topbar-center { display:flex; align-items:center; gap:12px; }
  .nav-btn { background:none; border:1.5px solid var(--border); width:34px; height:34px; border-radius:50%; font-size:16px; cursor:pointer; color:var(--gray); display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .nav-btn:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-lt); }
  .nav-title { font-size:18px; font-weight:700; color:var(--text); min-width:155px; text-align:center; }
  .topbar-right { display:flex; align-items:center; gap:8px; }
  .btn { display:inline-flex; align-items:center; gap:5px; border:none; padding:0 16px; height:36px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; white-space:nowrap; }
  .btn-primary { background:var(--blue); color:#fff; } .btn-primary:hover { background:var(--blue-d); }
  .btn-success { background:var(--green); color:#fff; } .btn-success:hover { background:var(--green-d); }
  .btn-ghost { background:var(--gray-lt); color:var(--gray); } .btn-ghost:hover { background:var(--border); }
  .btn-danger { background:#f3e3e1; color:var(--red); } .btn-danger:hover { background:#ecd2cf; }

  /* スタッフドロワー */
  .staff-bar { border-top:1px solid var(--border); background:#fafbfc; overflow:hidden; max-height:0; transition:max-height .25s ease, padding .25s ease; }
  .staff-bar.open { max-height:220px; padding:10px 24px; overflow-y:auto; }
  .staff-bar-inner { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .staff-bar-label { font-size:11px; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.6px; white-space:nowrap; }
  .staff-chips { display:flex; flex-wrap:wrap; gap:6px; flex:1; }
  .staff-chip { display:flex; align-items:center; gap:5px; background:#fff; border:1.5px solid var(--border); border-radius:20px; padding:3px 10px 3px 5px; font-size:12px; font-weight:600; color:var(--text); }
  .s-av { width:20px; height:20px; min-width:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; flex-shrink:0; }
  .staff-chip-del { background:none; border:none; color:#cbd5e0; font-size:14px; cursor:pointer; padding:0; line-height:1; margin-left:2px; }
  .staff-chip-del:hover { color:var(--red); }
  .staff-add-inline { display:flex; gap:6px; }
  .staff-add-inline input { height:30px; padding:0 10px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; outline:none; width:110px; }
  .staff-add-inline input:focus { border-color:var(--blue); }
  .staff-add-inline button { height:30px; padding:0 12px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; }
  .staff-add-inline button:hover { background:var(--blue-d); }

  /* 集計 */
  .summary-bar { display:flex; gap:10px; padding:14px 24px 0; }
  .s-card { background:#fff; border-radius:var(--radius); padding:12px 18px; flex:1; min-width:100px; box-shadow:var(--shadow); border:1px solid var(--border); }
  .s-card .sl { font-size:11px; color:var(--text-2); margin-bottom:3px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; }
  .s-card .sv { font-size:24px; font-weight:700; line-height:1; }

  /* 凡例 */
  .legend { display:flex; align-items:center; gap:12px; padding:10px 24px; flex-wrap:wrap; }
  .legend-label { font-size:11px; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.5px; }
  .legend-item { display:flex; align-items:center; gap:4px; font-size:12px; color:var(--text-2); }
  .legend-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }

  /* カレンダー */
  .calendar-wrap { padding:8px 24px 24px; }
  .calendar { background:#fff; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-md); border:1px solid var(--border); }
  .cal-head { display:grid; grid-template-columns:repeat(7,1fr); background:var(--gray-lt); border-bottom:1px solid var(--border); }
  .cal-head-cell { text-align:center; padding:9px 0; font-size:12px; font-weight:700; color:var(--text-2); }
  .cal-head-cell:first-child { color:#c4766b; }
  .cal-head-cell:last-child { color:var(--blue); }
  .cal-body { display:grid; grid-template-columns:repeat(7,1fr); }
  .cal-cell { border-right:1px solid var(--border); border-bottom:1px solid var(--border); height:var(--cell-h); padding:5px 4px 4px; cursor:pointer; transition:background .1s; overflow:hidden; display:flex; flex-direction:column; }
  .cal-cell:nth-child(7n) { border-right:none; }
  .cal-cell:hover { background:#f8fafc; }
  .cal-cell.other-month { background:#fafbfc; }
  .cal-cell.other-month .date-num { color:#cbd5e0; }
  .cal-cell.today { background:var(--blue-lt); }
  .date-num { font-size:12px; font-weight:700; color:var(--text-2); width:24px; height:24px; display:flex; align-items:center; justify-content:center; border-radius:50%; flex-shrink:0; margin-bottom:2px; align-self:flex-start; }
  .cal-cell.today .date-num { background:var(--blue); color:#fff; }
  .sun .date-num { color:#c4766b; }
  .sat .date-num { color:var(--blue); }
  .cal-cell.today.sun .date-num, .cal-cell.today.sat .date-num { color:#fff; }
  .chips-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; gap:2px; }

  /* 現場チップ — 2行構成（現場名 / 時間帯+担当） */
  .job-chip { border-radius:4px; padding:2px 5px; font-size:10px; font-weight:600; color:#fff; cursor:pointer; line-height:1.45; overflow:hidden; flex-shrink:0; transition:opacity .1s; }
  .job-chip:hover { opacity:.82; }
  .job-chip.done { opacity:.38; }
  .chip-site { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:700; }
  .chip-sub { display:flex; gap:4px; opacity:.92; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:9.5px; }
  .chip-time { background:rgba(0,0,0,.18); border-radius:2px; padding:0 3px; flex-shrink:0; }
  .chip-staff { overflow:hidden; text-overflow:ellipsis; }
  .more-chip { font-size:10px; color:#94a3b8; padding:0 3px; flex-shrink:0; }

  /* カテゴリカラー */
  .type-aircon { background:#6f97c2; }  /* 落ち着いた青 */
  .type-floor  { background:#9d8cc4; }  /* 落ち着いた紫 */
  .type-house  { background:#74ad8a; }  /* 落ち着いた緑 */
  .type-common { background:#5fa3a8; }  /* 落ち着いたシアン */
  .type-weed   { background:#cf9a5c; }  /* 落ち着いたオレンジ */
  .type-other  { background:#a3a8b3; }  /* 落ち着いたグレー */

  /* モーダル */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(2px); }
  .modal-bg.show { display:flex; }
  .modal { background:#fff; border-radius:14px; width:460px; max-width:96vw; padding:28px; box-shadow:0 20px 50px rgba(0,0,0,.18); max-height:94vh; overflow-y:auto; }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .modal-header h2 { font-size:16px; font-weight:700; color:var(--text); }
  .modal-close { background:var(--gray-lt); border:none; width:30px; height:30px; border-radius:50%; font-size:16px; cursor:pointer; color:var(--gray); display:flex; align-items:center; justify-content:center; }
  .modal-close:hover { background:var(--border); }
  .form-section { margin-bottom:16px; }
  .form-section label { display:block; font-size:12px; font-weight:700; color:var(--text-2); margin-bottom:5px; text-transform:uppercase; letter-spacing:.4px; }
  .form-section input, .form-section select, .form-section textarea { width:100%; padding:9px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; color:var(--text); background:#fff; outline:none; transition:border-color .15s; }
  .form-section input:focus, .form-section select:focus, .form-section textarea:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(59,130,246,.12); }
  .form-section textarea { resize:vertical; min-height:56px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .seg { display:flex; background:var(--gray-lt); border-radius:8px; padding:3px; gap:3px; }
  .seg input[type=radio] { display:none; }
  .seg label { flex:1; text-align:center; padding:7px 0; font-size:13px; font-weight:600; color:var(--text-2); border-radius:6px; cursor:pointer; transition:all .15s; }
  .seg input[type=radio]:checked + label { background:#fff; color:var(--blue); box-shadow:var(--shadow); }
  .staff-check-list { border:1.5px solid var(--border); border-radius:8px; padding:8px; background:#fafbfc; max-height:150px; overflow-y:auto; display:flex; flex-direction:column; gap:5px; }
  .sc-item { display:flex; flex-direction:row; flex-wrap:nowrap; align-items:center; gap:8px; cursor:pointer; padding:4px 2px; width:100%; }
  .sc-item input[type=checkbox] { width:16px; height:16px; min-width:16px; accent-color:var(--blue); cursor:pointer; flex-shrink:0; margin:0; }
  .sc-lbl { font-size:14px; color:var(--text); white-space:nowrap; }
  .d-row { display:flex; gap:10px; margin-bottom:10px; font-size:14px; align-items:flex-start; }
  .d-lbl { font-size:11px; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.4px; min-width:72px; padding-top:2px; flex-shrink:0; }
  .d-val { color:var(--text); line-height:1.5; }
  .type-badge { display:inline-block; padding:3px 12px; border-radius:20px; font-size:12px; font-weight:700; color:#fff; }
  .staff-tags { display:flex; flex-wrap:wrap; gap:5px; }
  .staff-tag { background:var(--blue-lt); color:var(--blue-d); border-radius:20px; padding:2px 10px; font-size:12px; font-weight:600; }
  .done-toggle { background:var(--blue-lt); border:1.5px solid var(--blue); color:var(--blue-d); border-radius:8px; padding:7px 14px; font-size:13px; font-weight:700; cursor:pointer; margin-right:auto; transition:all .15s; }
  .done-toggle.done { background:#eaf2ee; border-color:var(--green); color:var(--green-d); }
  .divider { height:1px; background:var(--border); margin:16px 0; }
  .btn-row { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; flex-wrap:wrap; }

  /* パスワードロック画面 */
  #lockScreen {
    position:fixed; inset:0; background:#f8fafc; z-index:1000;
    display:flex; align-items:center; justify-content:center;
  }
  #lockScreen.hidden { display:none; }
  .lock-box { background:#fff; border-radius:16px; padding:40px 36px; box-shadow:0 10px 40px rgba(0,0,0,.12); width:340px; max-width:90vw; text-align:center; }
  .lock-icon { font-size:40px; margin-bottom:8px; }
  .lock-title { font-size:18px; font-weight:700; color:var(--text); margin-bottom:4px; }
  .lock-sub { font-size:13px; color:var(--text-2); margin-bottom:20px; }
  .lock-input { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:18px; text-align:center; letter-spacing:4px; outline:none; margin-bottom:12px; }
  .lock-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(59,130,246,.12); }
  .lock-btn { width:100%; padding:12px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; }
  .lock-btn:hover { background:var(--blue-d); }
  .lock-error { color:var(--red); font-size:13px; margin-top:10px; min-height:18px; }
  #appRoot.locked { display:none; }
</style>
</head>
<body>

<!-- パスワードロック画面 -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">現場管理システム</div>
    <div class="lock-sub">パスワードを入力してください</div>
    <input type="password" id="lockInput" class="lock-input" placeholder="••••" inputmode="numeric" maxlength="8" onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="lock-btn" onclick="checkPassword()">開く</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<div id="appRoot" class="locked">

<div class="topbar">
  <div class="topbar-main">
    <div class="logo"><span class="logo-icon">🧹</span><span class="logo-text">現場管理システム</span></div>
    <div class="topbar-center">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <div class="nav-title" id="navTitle"></div>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost" onclick="goToday()">今月</button>
      <button class="btn btn-ghost" onclick="toggleStaffBar()">👷 スタッフ／外注管理</button>
      <button class="btn btn-success" onclick="openAddModal()">＋ 新規登録</button>
    </div>
  </div>
  <div class="staff-bar" id="staffBar">
    <div class="staff-bar-inner">
      <span class="staff-bar-label">スタッフ</span>
      <div class="staff-chips" id="staffChips"></div>
      <div class="staff-add-inline">
        <input type="text" id="newStaffName" placeholder="名前を入力" onkeydown="if(event.key==='Enter')addStaff()">
        <button onclick="addStaff()">追加</button>
      </div>
    </div>
    <div class="staff-bar-inner" style="margin-top:8px;">
      <span class="staff-bar-label">外注</span>
      <div class="staff-chips" id="vendorChips"></div>
      <div class="staff-add-inline">
        <input type="text" id="newVendorName" placeholder="業者名を入力" onkeydown="if(event.key==='Enter')addVendor()">
        <button onclick="addVendor()">追加</button>
      </div>
    </div>
  </div>
</div>

<div class="summary-bar" id="summary"></div>

<div class="legend">
  <span class="legend-label">種別</span>
  <span class="legend-item"><span class="legend-dot type-aircon"></span>エアコン洗浄</span>
  <span class="legend-item"><span class="legend-dot type-floor"></span>床清掃</span>
  <span class="legend-item"><span class="legend-dot type-house"></span>ハウスクリーニング</span>
  <span class="legend-item"><span class="legend-dot type-common"></span>共有部洗浄</span>
  <span class="legend-item"><span class="legend-dot type-weed"></span>除草作業</span>
  <span class="legend-item"><span class="legend-dot type-other"></span>その他</span>
</div>

<div class="calendar-wrap">
  <div class="calendar">
    <div class="cal-head">
      <div class="cal-head-cell">日</div><div class="cal-head-cell">月</div><div class="cal-head-cell">火</div>
      <div class="cal-head-cell">水</div><div class="cal-head-cell">木</div><div class="cal-head-cell">金</div>
      <div class="cal-head-cell">土</div>
    </div>
    <div class="cal-body" id="calBody"></div>
  </div>
</div>

<!-- 登録・編集モーダル -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">新規現場登録</h2>
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>
    </div>
    <div class="form-section"><label>現場名 *</label><input type="text" id="f_site" placeholder="例：ワーキングガール"></div>
    <div class="form-section"><label>顧客名</label><input type="text" id="f_customer" placeholder="例：田中 太郎"></div>
    <div class="form-grid">
      <div class="form-section"><label>作業日 *</label><input type="date" id="f_date"></div>
      <div class="form-section">
        <label>時間帯</label>
        <div class="seg">
          <input type="radio" name="ts" id="ts_am" value="am" checked><label for="ts_am">☀️ 午前</label>
          <input type="radio" name="ts" id="ts_pm" value="pm"><label for="ts_pm">🌇 午後</label>
        </div>
      </div>
    </div>
    <div class="form-section">
      <label>作業種別 *</label>
      <select id="f_type">
        <option value="aircon">エアコン洗浄</option>
        <option value="floor">床清掃</option>
        <option value="house">ハウスクリーニング</option>
        <option value="common">共有部洗浄</option>
        <option value="weed">除草作業</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="form-section"><label>担当スタッフ（複数可）</label><div class="staff-check-list" id="staffCheckList"></div></div>
    <div class="form-section"><label>外注業者（複数可）</label><div class="staff-check-list" id="vendorCheckList"></div></div>
    <div class="form-section"><label>メモ</label><textarea id="f_memo" placeholder="備考・注意事項など"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">キャンセル</button>
      <button class="btn btn-success" onclick="saveJob()">保存する</button>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="d_title"></h2>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div id="d_badge" style="margin-bottom:12px"></div>
    <div class="d-row"><span class="d-lbl">現場名</span><span class="d-val" id="d_site"></span></div>
    <div class="d-row"><span class="d-lbl">顧客名</span><span class="d-val" id="d_customer"></span></div>
    <div class="d-row"><span class="d-lbl">作業日</span><span class="d-val" id="d_date"></span></div>
    <div class="d-row"><span class="d-lbl">時間帯</span><span class="d-val" id="d_time"></span></div>
    <div class="d-row"><span class="d-lbl">担当</span><div class="staff-tags" id="d_staff"></div></div>
    <div class="d-row"><span class="d-lbl">外注</span><div class="staff-tags" id="d_vendor"></div></div>
    <div class="d-row"><span class="d-lbl">メモ</span><span class="d-val" id="d_memo"></span></div>
    <div class="divider"></div>
    <div class="btn-row">
      <button class="btn btn-danger" onclick="deleteJob()">削除</button>
      <button class="done-toggle" id="doneToggle" onclick="toggleDone()">完了にする ✓</button>
      <button class="btn btn-ghost" onclick="openEditFromDetail()">編集</button>
      <button class="btn btn-primary" onclick="closeModal('detailModal')">閉じる</button>
    </div>
  </div>
</div>
</div><!-- /#appRoot -->

<script>
/* =====================================================================
   現場管理システム
   - データはブラウザの localStorage に保存されます
   - パスワードは下の APP_PASSWORD で変更できます
   ===================================================================== */

/* ---- 設定値 ---- */
const APP_PASSWORD = '3973'; // ←ここを好きな数字・文字列に変更してください

const TYPE_LABELS  = { aircon:'エアコン洗浄', floor:'床清掃', house:'ハウスクリーニング', common:'共有部洗浄', weed:'除草作業', other:'その他' };
const TYPE_CLASSES = { aircon:'type-aircon', floor:'type-floor', house:'type-house', common:'type-common', weed:'type-weed', other:'type-other' };
const COLORS = ['#6f97c2','#5fa3a8','#cf9a5c','#9d8cc4','#c4766b','#74ad8a','#c98ba8','#7ba0bd','#7fb3a8','#d0a06f'];

/* ---- アプリ状態 ---- */
let currentYear, currentMonth, jobs=[], staffs=[], vendors=[], editingId=null, viewingId=null;

/* ---- PDF由来のスタッフ ---- */
const DEFAULT_STAFFS = [
  {id:101,name:'鈴木'},{id:102,name:'糸賀'},{id:103,name:'塚本'},
  {id:104,name:'天ヶ谷'},{id:105,name:'会長'},{id:106,name:'待子'},
  {id:107,name:'片山'},{id:108,name:'逆井'},{id:109,name:'社長'},
];

/* ---- PDF由来の外注業者 ---- */
const DEFAULT_VENDORS = [

function init() {
  const t=new Date(); currentYear=t.getFullYear(); currentMonth=t.getMonth()+1;
  loadData();
  if (!staffs.length) staffs=[...DEFAULT_STAFFS];
  if (!vendors.length) vendors=[...DEFAULT_VENDORS];
  // 6月のPDFデータをマージ（既存データがなければ投入）
  const has2026June = jobs.some(j=>j.date&&j.date.startsWith('2026-06'));
  if (!has2026June) {
    PDF_JOBS.forEach((j,i)=>{ jobs.push({...j, vendorIds:j.vendorIds||[], id: 2000+i, done:false}); });
  }
  saveData();
  render();
}

function saveData(){
  try {
    localStorage.setItem('hc5_jobs',JSON.stringify(jobs));
    localStorage.setItem('hc5_staffs',JSON.stringify(staffs));
    localStorage.setItem('hc5_vendors',JSON.stringify(vendors));
  } catch(e){}
}
function loadData(){
  try {
    const j=localStorage.getItem('hc5_jobs'); if(j) jobs=JSON.parse(j);
    const s=localStorage.getItem('hc5_staffs'); if(s) staffs=JSON.parse(s);
    const v=localStorage.getItem('hc5_vendors'); if(v) vendors=JSON.parse(v);
  } catch(e){}
}

function vColor(i){ return COLORS[(i+5)%COLORS.length]; }
function sColor(i){ return COLORS[i%COLORS.length]; }
function staffName(id){ const s=staffs.find(s=>s.id===id); return s?s.name:''; }

/* ---- RENDER ---- */
function render(){ renderNav(); renderSummary(); renderCalendar(); renderStaffChips(); renderVendorChips(); }

function renderNav(){
  const n=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('navTitle').textContent=`${currentYear}年 ${n[currentMonth-1]}`;
}

function renderSummary(){
  const mj=jobs.filter(j=>{ const[y,m]=j.date.split('-').map(Number); return y===currentYear&&m===currentMonth; });
  const done=mj.filter(j=>j.done).length;
  const counts={}; Object.keys(TYPE_LABELS).forEach(t=>counts[t]=mj.filter(j=>j.type===t).length);
  const top=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('summary').innerHTML=`
    <div class="s-card"><div class="sl">今月の現場</div><div class="sv">${mj.length}<span style="font-size:13px;font-weight:500;color:var(--text-2)"> 件</span></div></div>
    <div class="s-card"><div class="sl">完了</div><div class="sv" style="color:var(--green-d)">${done}<span style="font-size:13px;font-weight:500;color:var(--text-2)"> 件</span></div></div>
    <div class="s-card"><div class="sl">未完了</div><div class="sv" style="color:var(--red)">${mj.length-done}<span style="font-size:13px;font-weight:500;color:var(--text-2)"> 件</span></div></div>
    <div class="s-card"><div class="sl">最多種別</div><div class="sv" style="font-size:14px;margin-top:4px">${top&&top[1]>0?TYPE_LABELS[top[0]]:'—'}</div></div>`;
}

function renderCalendar(){
  const body=document.getElementById('calBody'); body.innerHTML='';
  const today=new Date(); today.setHours(0,0,0,0);
  const first=new Date(currentYear,currentMonth-1,1);
  const startDow=first.getDay(), totalDays=new Date(currentYear,currentMonth,0).getDate();
  for(let i=0;i<startDow;i++) body.appendChild(makeCell(new Date(currentYear,currentMonth-1,-startDow+i+1),true));
  for(let d=1;d<=totalDays;d++) body.appendChild(makeCell(new Date(currentYear,currentMonth-1,d),false));
  const rem=42-(startDow+totalDays);
  for(let i=1;i<=rem;i++) body.appendChild(makeCell(new Date(currentYear,currentMonth,i),true));
}

function makeCell(date,other){
  const cell=document.createElement('div');
  const dow=date.getDay();
  cell.className='cal-cell'+(other?' other-month':'')+(dow===0?' sun':dow===6?' sat':'');
  const today=new Date(); today.setHours(0,0,0,0);
  if(date.getTime()===today.getTime()) cell.classList.add('today');
  const ds=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  const dayJobs=jobs.filter(j=>j.date===ds).sort((a,b)=>a.time==='am'&&b.time==='pm'?-1:1);

  const num=document.createElement('div'); num.className='date-num'; num.textContent=date.getDate(); cell.appendChild(num);
  const wrap=document.createElement('div'); wrap.className='chips-wrap'; cell.appendChild(wrap);

  const maxShow=3;
  dayJobs.slice(0,maxShow).forEach(job=>{
    const chip=document.createElement('div');
    chip.className=`job-chip ${TYPE_CLASSES[job.type]}${job.done?' done':''}`;

    // 現場名
    const siteLine=document.createElement('div');
    siteLine.className='chip-site';
    siteLine.textContent=job.site;
    chip.appendChild(siteLine);

    // 午前/午後 + スタッフ名
    const subLine=document.createElement('div');
    subLine.className='chip-sub';
    const timeSpan=document.createElement('span');
    timeSpan.className='chip-time';
    timeSpan.textContent=job.time==='am'?'午前':'午後';
    subLine.appendChild(timeSpan);
    const staffSpan=document.createElement('span');
    staffSpan.className='chip-staff';
    const names=(job.staffIds||[]).map(id=>staffName(id)).filter(Boolean);
    staffSpan.textContent=names.join('・')||'未定';
    subLine.appendChild(staffSpan);
    chip.appendChild(subLine);

    chip.title=`${job.site} [${job.time==='am'?'午前':'午後'}] ${names.join('・')||'未定'}`;
    chip.onclick=e=>{e.stopPropagation();openDetail(job.id);};
    wrap.appendChild(chip);
  });
  if(dayJobs.length>maxShow){
    const m=document.createElement('div'); m.className='more-chip'; m.textContent=`+${dayJobs.length-maxShow}件`;
    wrap.appendChild(m);
  }
  cell.onclick=()=>openAddModal(ds);
  return cell;
}

/* ---- スタッフバー ---- */
function toggleStaffBar(){ document.getElementById('staffBar').classList.toggle('open'); }

function renderStaffChips(){
  const c=document.getElementById('staffChips');
  if(!staffs.length){ c.innerHTML='<span style="font-size:12px;color:#94a3b8">スタッフがいません</span>'; return; }
  c.innerHTML=staffs.map((s,i)=>`
    <div class="staff-chip">
      <span class="s-av" style="background:${sColor(i)}">${s.name.charAt(0)}</span>
      ${s.name}
      <button class="staff-chip-del" onclick="deleteStaff(${s.id})">×</button>
    </div>`).join('');
}

function addStaff(){
  const inp=document.getElementById('newStaffName'), name=inp.value.trim();
  if(!name) return;
  if(staffs.find(s=>s.name===name)){alert('同じ名前のスタッフがいます');return;}
  staffs.push({id:Date.now(),name}); inp.value=''; saveData(); renderStaffChips();
}

function deleteStaff(id){
  if(!confirm('このスタッフを削除しますか？')) return;
  staffs=staffs.filter(s=>s.id!==id);
  jobs=jobs.map(j=>({...j,staffIds:(j.staffIds||[]).filter(sid=>sid!==id)}));
  saveData(); render();
}

function renderVendorChips(){
  const c=document.getElementById('vendorChips');
  if(!vendors.length){ c.innerHTML='<span style="font-size:12px;color:#94a3b8">外注業者がいません</span>'; return; }
  c.innerHTML=vendors.map((v,i)=>`
    <div class="staff-chip">
      <span class="s-av" style="background:${vColor(i)}">${v.name.charAt(0)}</span>
      ${v.name}
      <button class="staff-chip-del" onclick="deleteVendor(${v.id})">×</button>
    </div>`).join('');
}

function addVendor(){
  const inp=document.getElementById('newVendorName'), name=inp.value.trim();
  if(!name) return;
  if(vendors.find(v=>v.name===name)){alert('同じ名前の外注業者がいます');return;}
  vendors.push({id:Date.now()+1,name}); inp.value=''; saveData(); renderVendorChips();
}

function deleteVendor(id){
  if(!confirm('この外注業者を削除しますか？')) return;
  vendors=vendors.filter(v=>v.id!==id);
  jobs=jobs.map(j=>({...j,vendorIds:(j.vendorIds||[]).filter(vid=>vid!==id)}));
  saveData(); render();
}

/* ---- 現場フォーム ---- */

  const c=document.getElementById('staffCheckList');
  if(!staffs.length){ c.innerHTML='<span style="font-size:12px;color:#94a3b8">先にスタッフを登録してください</span>'; return; }

    <label class="sc-item">
      <input type="checkbox" value="${s.id}" ${selIds.includes(s.id)?'checked':''}>
      <span class="s-av" style="background:${sColor(i)}">${s.name.charAt(0)}</span>
      <span class="sc-lbl">${s.name}</span>
    </label>`).join('');
}

function getSelStaffIds(){ return Array.from(document.querySelectorAll('#staffCheckList input:checked')).map(el=>Number(el.value)); }

function renderVendorCheckList(selIds=[]){
  const c=document.getElementById('vendorCheckList');
  if(!vendors.length){ c.innerHTML='<span style="font-size:12px;color:#94a3b8">先に外注業者を登録してください</span>'; return; }
  c.innerHTML=vendors.map((v,i)=>`
    <label class="sc-item">
      <input type="checkbox" value="${v.id}" ${selIds.includes(v.id)?'checked':''}>
      <span class="s-av" style="background:${vColor(i)}">${v.name.charAt(0)}</span>
      <span class="sc-lbl">${v.name}</span>
    </label>`).join('');
}

function getSelVendorIds(){ return Array.from(document.querySelectorAll('#vendorCheckList input:checked')).map(el=>Number(el.value)); }

function openAddModal(dateStr){
  editingId=null;
  document.getElementById('modalTitle').textContent='新規現場登録';
  document.getElementById('f_site').value='';
  document.getElementById('f_customer').value='';
  document.getElementById('f_date').value=dateStr||'';
  document.getElementById('ts_am').checked=true;
  document.getElementById('f_type').value='aircon';
  document.getElementById('f_memo').value='';
  renderStaffCheckList([]);
  renderVendorCheckList([]);
  document.getElementById('editModal').classList.add('show');
}

function openEditFromDetail(){
  closeModal('detailModal');
  const job=jobs.find(j=>j.id===viewingId); if(!job) return;
  editingId=job.id;
  document.getElementById('modalTitle').textContent='現場を編集';
  document.getElementById('f_site').value=job.site||'';
  document.getElementById('f_customer').value=job.customer||'';
  document.getElementById('f_date').value=job.date;
  document.querySelector(`input[name=ts][value=${job.time||'am'}]`).checked=true;
  document.getElementById('f_type').value=job.type;
  document.getElementById('f_memo').value=job.memo||'';
  renderStaffCheckList(job.staffIds||[]);
  renderVendorCheckList(job.vendorIds||[]);
  document.getElementById('editModal').classList.add('show');
}

function saveJob(){
  const site=document.getElementById('f_site').value.trim();
  const date=document.getElementById('f_date').value;
  if(!site||!date){alert('現場名と作業日は必須です');return;}
  const job={
    id:editingId||Date.now(),
    site,
    customer:document.getElementById('f_customer').value.trim(),
    date,
    time:document.querySelector('input[name=ts]:checked').value,
    type:document.getElementById('f_type').value,
    staffIds:getSelStaffIds(),
    vendorIds:getSelVendorIds(),
    memo:document.getElementById('f_memo').value.trim(),
    done:editingId?(jobs.find(j=>j.id===editingId)||{}).done||false:false,
  };
  if(editingId) jobs=jobs.map(j=>j.id===editingId?job:j); else jobs.push(job);
  saveData(); closeModal('editModal'); render();
}

/* ---- 詳細 ---- */
function openDetail(id){
  const job=jobs.find(j=>j.id===id); if(!job) return;
  viewingId=id;
  document.getElementById('d_title').textContent=job.site;
  document.getElementById('d_badge').innerHTML=`<span class="type-badge ${TYPE_CLASSES[job.type]}">${TYPE_LABELS[job.type]}</span>`;
  document.getElementById('d_site').textContent=job.site;
  document.getElementById('d_customer').textContent=job.customer||'—';
  document.getElementById('d_date').textContent=job.date;
  document.getElementById('d_time').textContent=job.time==='am'?'☀️ 午前':'🌇 午後';
  const ids=job.staffIds||[];
  document.getElementById('d_staff').innerHTML=ids.length
    ?ids.map(id=>{const s=staffs.find(s=>s.id===id);return s?`<span class="staff-tag">${s.name}</span>`:''}).join('')
    :'<span style="color:#94a3b8">未定</span>';
  const vids=job.vendorIds||[];
  document.getElementById('d_vendor').innerHTML=vids.length
    ?vids.map(id=>{const v=vendors.find(v=>v.id===id);return v?`<span class="staff-tag">${v.name}</span>`:''}).join('')
    :'<span style="color:#94a3b8">なし</span>';
  document.getElementById('d_memo').textContent=job.memo||'—';
  const btn=document.getElementById('doneToggle');
  btn.textContent=job.done?'✅ 完了済み（クリックで戻す）':'完了にする ✓';
  btn.className='done-toggle'+(job.done?' done':'');
  document.getElementById('detailModal').classList.add('show');
}

function toggleDone(){
  const job=jobs.find(j=>j.id===viewingId); if(!job) return;
  job.done=!job.done; saveData(); openDetail(viewingId); render();
}

function deleteJob(){
  if(!confirm('この現場を削除しますか？')) return;
  jobs=jobs.filter(j=>j.id!==viewingId); saveData(); closeModal('detailModal'); render();
}

function closeModal(id){ document.getElementById(id).classList.remove('show'); }
function changeMonth(d){ currentMonth+=d; if(currentMonth>12){currentMonth=1;currentYear++;} if(currentMonth<1){currentMonth=12;currentYear--;} render(); }
function goToday(){ const t=new Date(); currentYear=t.getFullYear(); currentMonth=t.getMonth()+1; render(); }

document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('show');}));

/* ---- パスワード認証 ---- */
function checkPassword(){
  const input = document.getElementById('lockInput').value;
  if (input === APP_PASSWORD) {
    document.getElementById('lockScreen').classList.add('hidden');
    document.getElementById('appRoot').classList.remove('locked');
    try { sessionStorage.setItem('hc5_unlocked','1'); } catch(e){}
    init();
  } else {
    document.getElementById('lockError').textContent = 'パスワードが違います';
    document.getElementById('lockInput').value = '';
    document.getElementById('lockInput').focus();
  }
}

// このセッション内ですでに解除済みならスキップ
(function(){
  try {
    if (sessionStorage.getItem('hc5_unlocked') === '1') {
      document.getElementById('lockScreen').classList.add('hidden');
      document.getElementById('appRoot').classList.remove('locked');
      init();
    }
  } catch(e){}
})();
</script>
